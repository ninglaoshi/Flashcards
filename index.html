<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chinese Flashcards SRS</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --accent-primary: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            /* Sleek Color Coding for Distinct States */
            --front-cn-bg: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            --front-en-bg: linear-gradient(135deg, #1e2a38 0%, #0d1e2d 100%);
            --back-card-bg: linear-gradient(135deg, #0f172a 0%, #111827 100%);
            
            /* Double-sized Ergonomic Grading Button Colors */
            --btn-1: #ef4444;
            --btn-2: #f97316;
            --btn-3: #eab308;
            --btn-4: #06b6d4;
            --btn-5: #10b981;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* DASHBOARD / WELCOME SCREEN */
        .dashboard-container {
            width: 100%;
            max-width: 380px;
            background: var(--panel-bg);
            border-radius: 24px;
            padding: 24px;
            box-sizing: border-box;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .dash-header { text-align: center; margin-bottom: 24px; }
        .dash-title { font-size: 1.6rem; font-weight: 700; margin: 0; color: var(--text-main); }
        .dash-subtitle { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-box {
            background: rgba(15, 23, 42, 0.5);
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.03);
        }
        .stat-val { font-size: 1.8rem; font-weight: 700; color: var(--accent-primary); }
        .stat-lbl { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; margin-top: 4px; letter-spacing: 0.5px; }

        .mastery-panel {
            background: rgba(15, 23, 42, 0.3);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 24px;
        }
        .mastery-title { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.5px; text-align: center;}
        .mastery-row { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 6px; color: #cbd5e1; }
        .mastery-row:last-child { margin-bottom: 0; }

        .btn-start {
            width: 100%;
            background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%);
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(56, 189, 248, 0.2);
            transition: transform 0.1s;
        }
        .btn-start:active { transform: scale(0.98); }

        /* MAIN FLASHCARD WORKSPACE */
        .workspace { width: 100%; max-width: 380px; display: flex; flex-direction: column; }
        
        .workspace-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 0 4px;
        }
        .counter-pill {
            background: var(--panel-bg);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .btn-undo {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .btn-undo:active { background: rgba(255,255,255,0.05); }

        .flashcard-container {
            width: 100%;
            height: 290px;
            perspective: 1000px;
            position: relative;
            margin-bottom: 24px;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }
        .flashcard.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            box-sizing: border-box;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-align: center;
        }

        /* Distinct Front Layout Visual Subconscious Vectors */
        .card-front.cn-mode {
            background: var(--front-cn-bg);
            border: 2px solid rgba(56, 189, 248, 0.25);
        }
        .card-front.en-mode {
            background: var(--front-en-bg);
            border: 2px solid rgba(16, 185, 129, 0.25);
        }
        
        /* High Contrast Distinct Dark Answer Panel Background */
        .card-back {
            background: var(--back-card-bg);
            transform: rotateY(180deg);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .tag-pill {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.05);
        }
        .cn-mode .tag-pill { color: var(--accent-primary); }
        .en-mode .tag-pill { color: var(--btn-5); }
        .card-back .tag-pill { color: var(--text-muted); }

        .main-text { font-size: 2.6rem; font-weight: 700; letter-spacing: -0.5px; line-height: 1.2; }
        .back-main { font-size: 2.2rem; font-weight: 700; color: #fff; margin-bottom: 6px; }
        .back-sub { font-size: 1.4rem; color: var(--accent-primary); font-weight: 400; }

        /* GIANT ERGONOMIC THUMB BUTTON LAYOUTS */
        .controls-wrapper { width: 100%; min-height: 100px; }
        .hint-banner { text-align: center; color: var(--text-muted); font-size: 0.9rem; animation: pulse 2s infinite; padding: 20px; }
        
        .grading-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            width: 100%;
        }

        .grad-btn {
            border: none;
            color: white;
            /* Doubled operational tap height height profile target values */
            height: 75px; 
            font-size: 0.72rem;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .grad-btn:active { transform: scale(0.92); }
        .grad-btn span { font-size: 1.1rem; } /* Emoji indicators */
        
        .b1 { background: var(--btn-1); }
        .b2 { background: var(--btn-2); }
        .b3 { background: var(--btn-3); color: #0f172a; }
        .b4 { background: var(--btn-4); }
        .b5 { background: var(--btn-5); }

        #loading-screen { font-weight: 500; color: var(--accent-primary); font-size: 1.1rem; }
        
        .toast-sync {
            position: fixed;
            bottom: 20px;
            background: #0284c7;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            display: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 999;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 0.8; }
            100% { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <div id="toast" class="toast-sync">Updating Sheet...</div>

    <div id="loading-screen">Assembling Dashboard...</div>

    <div id="dashboard" class="dashboard-container" style="display: none;">
        <div class="dash-header">
            <h2 class="dash-title">Flashcard Mission</h2>
            <div class="dash-subtitle" id="dash-date">Ready for Review</div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-val" id="stat-due">0</div>
                <div class="stat-lbl">Due Reviews</div>
            </div>
            <div class="stat-box">
                <div class="stat-val" id="stat-new">0</div>
                <div class="stat-lbl">New Words</div>
            </div>
        </div>

        <div class="mastery-panel">
            <div class="mastery-title">Current Deck Progress</div>
            <div class="mastery-row"><span>🔥 High Mastery (Lv 5):</span><span id="m-lv5">0</span></div>
            <div class="mastery-row"><span>⚡ Progressing (Lv 2-4):</span><span id="m-mid">0</span></div>
            <div class="mastery-row"><span>⚠️ Struggling (Lv 1):</span><span id="m-lv1">0</span></div>
        </div>

        <button class="btn-start" id="action-btn" onclick="startSession()">Initialize Cards</button>
    </div>

    <div id="study-space" class="workspace" style="display: none;">
        <div class="workspace-header">
            <button class="btn-undo" id="undo-element" onclick="triggerUndo()" style="visibility: hidden;">
                <span>↩</span> Undo Score
            </button>
            <div class="counter-pill" id="progress-counter">0 Cards left</div>
        </div>

        <div class="flashcard-container">
            <div class="flashcard" id="card-node" onclick="executeFlip()">
                <div class="card-face card-front" id="card-front-face">
                    <div class="tag-pill" id="front-pill-tag">Loading</div>
                    <div class="main-text" id="front-display-text">...</div>
                </div>
                <div class="card-face card-back">
                    <div class="tag-pill">Answer View</div>
                    <div class="back-main" id="back-display-main">...</div>
                    <div class="back-sub" id="back-display-sub">...</div>
                </div>
            </div>
        </div>

        <div class="controls-wrapper">
            <div id="tap-hint" class="hint-banner">Tap card canvas to reveal parameters</div>
            <div id="grade-controls" class="grading-grid" style="display: none;">
                <button class="grad-btn b1" onclick="submitPerformanceRating(1)"><span>❌</span>No Clue</button>
                <button class="grad-btn b2" onclick="submitPerformanceRating(2)"><span>⏳</span>Struggled</button>
                <button class="grad-btn b3" onclick="submitPerformanceRating(3)"><span>🤔</span>Hesitant</button>
                <button class="grad-btn b4" onclick="submitPerformanceRating(4)"><span>✅</span>Good</button>
                <button class="grad-btn b5" onclick="submitPerformanceRating(5)"><span>⚡</span>Instant</button>
            </div>
        </div>
    </div>

    <script>
        const READ_URL = `https://docs.google.com/spreadsheets/d/1b8lnc2vGRLPi4U9K9wTBjiSrEshXtAJyYooyXQiwy8I/gviz/tq?tqx=out:csv`;
        const WRITE_URL = `https://script.google.com/macros/s/AKfycbz4hg446isJBp97-1d7BINvID_2k8w2AYcyTB9pNL1dOPmLFzhCTUgaFOX0P2qGW157/exec`;

        let masterDeck = [];
        let activeQueue = [];
        let historicalReviewStack = []; // Tracking log to manage undo requests
        let isFlipped = false;
        let isOverstudyMode = false;

        // Set modern localized timestamp subtitle string
        document.getElementById('dash-date').innerText = new Date().toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });

        // Connect directly to live sheet database records
        fetch(READ_URL)
            .then(res => res.text())
            .then(csvText => {
                parseSheetDatabase(csvText);
                compileDashboardMetrics();
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            })
            .catch(err => {
                document.getElementById('loading-screen').innerText = "Security block mismatch. Validate public parameters.";
                console.error(err);
            });

        function parseSheetDatabase(text) {
            const lines = text.split('\n');
            for(let i = 1; i < lines.length; i++) {
                if(!lines[i].trim()) continue;
                const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                if(!cols[0]) continue;

                const chinese = cols[0];
                const english = cols[1] ? cols[1] : cols[3];
                const pinyin = cols[2] ? cols[2] : cols[4];

                const c2eScore = cols[5] ? parseInt(cols[5]) : 0;
                const e2cScore = cols[6] ? parseInt(cols[6]) : 0;
                const c2eCount = cols[7] ? parseInt(cols[7]) : 0;
                const e2cCount = cols[8] ? parseInt(cols[8]) : 0;
                
                const c2eTime = cols[9] ? new Date(cols[9]) : null;
                const e2cTime = cols[10] ? new Date(cols[10]) : null;

                // Segment base row vectors into dual target arrays
                masterDeck.push({ chinese, english, pinyin, score: c2eScore, count: c2eCount, lastTime: c2eTime, type: 'CN_TO_EN' });
                masterDeck.push({ chinese, english, pinyin, score: e2cScore, count: e2cCount, lastTime: e2cTime, type: 'EN_TO_CN' });
            }
        }

        function compileDashboardMetrics() {
            const now = new Date();
            let reviewsDue = 0;
            let unviewedCount = 0;
            let lv5 = 0, mid = 0, lv1 = 0;

            activeQueue = [];

            masterDeck.forEach(card => {
                // Tracking total tier buckets for status reports
                if (card.count === 0) unviewedCount++;
                else if (card.score === 1) lv1++;
                else if (card.score === 5) lv5++;
                else if (card.score > 1 && card.score < 5) mid++;

                // SRS math parser
                if (card.count === 0) {
                    card.urgency = 100;
                    activeQueue.push(card);
                    reviewsDue++;
                } else {
                    let intervalDays = 0;
                    if (card.score === 1) intervalDays = 0.005;
                    else if (card.score === 2) intervalDays = 1;
                    else if (card.score === 3) intervalDays = 3;
                    else if (card.score === 4) intervalDays = 7;
                    else if (card.score === 5) intervalDays = 14;

                    const daysElapsed = (now - card.lastTime) / (1000 * 60 * 60 * 24);
                    if (daysElapsed >= intervalDays) {
                        card.urgency = daysElapsed / (intervalDays || 0.005);
                        activeQueue.push(card);
                        if (card.score > 0) reviewsDue++;
                    }
                }
            });

            // Sort sequence by prioritized urgency rating values
            activeQueue.sort((a, b) => b.urgency - a.urgency);

            // Populate text targets
            document.getElementById('stat-due').innerText = reviewsDue;
            document.getElementById('stat-new').innerText = unviewedCount;
            document.getElementById('m-lv5').innerText = lv5;
            document.getElementById('m-mid').innerText = mid;
            document.getElementById('m-lv1').innerText = lv1;

            const actionBtn = document.getElementById('action-btn');
            if (activeQueue.length === 0) {
                document.getElementById('dash-date').innerText = "Rest Mode Active";
                actionBtn.innerText = "Review Stack Empty: Free Play";
                actionBtn.style.background = "linear-gradient(135deg, #10b981 0%, #059669 100%)";
            } else {
                actionBtn.innerText = "Commence Study Session";
            }
        }

        function startSession() {
            if(activeQueue.length === 0) {
                isOverstudyMode = true;
            }
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('study-space').style.display = 'flex';
            renderNextCardInstance();
        }

        function renderNextCardInstance() {
            // Check terminal review parameters
            if (activeQueue.length === 0 && !isOverstudyMode) {
                document.getElementById('study-space').style.display = 'none';
                compileDashboardMetrics();
                document.getElementById('dashboard').style.display = 'block';
                return;
            }

            let card;
            if (isOverstudyMode) {
                // Free play pulls from any element via statistical evaluation sweeps
                masterDeck.sort((a,b) => (a.score || 0) - (b.score || 0));
                card = masterDeck[Math.floor(Math.random() * Math.min(8, masterDeck.length))];
                document.getElementById('progress-counter').innerText = "Free Play Mode";
            } else {
                card = activeQueue[0];
                document.getElementById('progress-counter').innerText = `${activeQueue.length} items to evaluate`;
            }

            window.activeCard = card;

            // Reset UI animation states
            const cardNode = document.getElementById('card-node');
            cardNode.classList.remove('flipped');
            isFlipped = false;

            document.getElementById('tap-hint').style.display = 'block';
            document.getElementById('grade-controls').style.display = 'none';

            // Show or hide Undo button based on historical stack length
            document.getElementById('undo-element').style.visibility = historicalReviewStack.length > 0 ? 'visible' : 'hidden';

            const frontFace = document.getElementById('card-front-face');
            const pillTag = document.getElementById('front-pill-tag');

            // Set layout elements dynamically to cue correct cognitive modes
            if (card.type === 'CN_TO_EN') {
                frontFace.className = "card-face card-front cn-mode";
                pillTag.innerText = "Character Recognition";
                document.getElementById('front-display-text').innerText = card.chinese;
                
                document.getElementById('back-display-main').innerText = card.english;
                document.getElementById('back-display-sub').innerText = card.pinyin;
            } else {
                frontFace.className = "card-face card-front en-mode";
                pillTag.innerText = "English Production";
                document.getElementById('front-display-text').innerText = card.english;
                
                document.getElementById('back-display-main').innerText = card.chinese;
                document.getElementById('back-display-sub').innerText = card.pinyin;
            }
        }

        function executeFlip() {
            if (isFlipped) return;
            document.getElementById('card-node').classList.add('flipped');
            isFlipped = true;
            document.getElementById('tap-hint').style.display = 'none';
            document.getElementById('grade-controls').style.display = 'grid';
        }

        function submitPerformanceRating(score) {
            const card = window.activeCard;

            // Capture snapshots to manage precise structural undos later
            historicalReviewStack.push({
                cardObject: card,
                previousScore: card.score,
                previousCount: card.count,
                previousLastTime: card.lastTime,
                wasInQueue: !isOverstudyMode
            });

            // Strip local item out of loop focal range array immediately
            if (!isOverstudyMode) {
                activeQueue.shift();
            }

            // Write properties to local system profile state cache targets
            card.score = score;
            card.count += 1;
            card.lastTime = new Date();

            transmitPayloadToCloud(card.chinese, card.type, score);
            renderNextCardInstance();
        }

        function triggerUndo() {
            if (historicalReviewStack.length === 0) return;

            // Extract last interaction event profile parameters
            const logEntry = historicalReviewStack.pop();
            const card = logEntry.cardObject;

            // Send standard rollback target instructions out to network background workers
            toggleToastVisibility(true);
            
            // To roll back, we instruct spreadsheet system to write previous values
            // By passing a negative score payload signal, the script could adapt, 
            // but the easiest robust solution is tracking it locally and overwriting 
            // the counter safely by transmitting the accurate historic target values.
            fetch(WRITE_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    word: card.chinese,
                    type: card.type,
                    score: logEntry.previousScore,
                    rollbackDecrement: true // Flag passed to override native incremental logic blocks
                })
            }).then(() => toggleToastVisibility(false))
              .catch(() => toggleToastVisibility(false));

            // Restore accurate state attributes into local memory fields
            card.score = logEntry.previousScore;
            card.count = logEntry.previousCount;
            card.lastTime = logEntry.previousLastTime;

            // Inject object reference structures back onto front sequence arrays
            if (logEntry.wasInQueue) {
                activeQueue.unshift(card);
            }

            // Retract overstudy triggers if an active element loop is restored
            if(activeQueue.length > 0) {
                isOverstudyMode = false;
            }

            renderNextCardInstance();
        }

        function transmitPayloadToCloud(word, type, score) {
            toggleToastVisibility(true);
            fetch(WRITE_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ word, type, score })
            }).then(() => {
                toggleToastVisibility(false);
            }).catch(e => {
                console.error("Transmission fault logged: ", e);
                toggleToastVisibility(false);
            });
        }

        function toggleToastVisibility(show) {
            document.getElementById('toast').style.display = show ? 'block' : 'none';
        }
    </script>
</body>
</html>
